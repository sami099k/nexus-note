<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | NexusNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0d1b2a;
    --bg-soft: #1b263b;
    --card: #102542;
    --text: #f4f7fb;
    --muted: #9fb2ca;
    --accent: #00d4ff;
    --accent2: #ff8a00;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    background: radial-gradient(circle at left top, #224f7a 0%, var(--bg) 45%), var(--bg);
    color: var(--text);
    overflow: hidden;
}

.cursor-aura {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(0, 212, 255, 0.2), rgba(0, 212, 255, 0));
    transform: translate(-50%, -50%);
    z-index: 0;
}

.float-chip {
    position: fixed;
    width: 90px;
    height: 90px;
    border-radius: 20px;
    background: rgba(63, 247, 201, 0.16);
    border: 1px solid rgba(255,255,255,0.2);
    z-index: 0;
    animation: floatChip 10s ease-in-out infinite;
}

.chip-a {
    top: 16vh;
    right: 9vw;
}

.chip-b {
    bottom: 12vh;
    left: 6vw;
    animation-delay: 1.8s;
}

.page {
    width: min(1040px, 92%);
    margin: 0 auto;
    padding-top: 28px;
    position: relative;
    z-index: 1;
}

.top-nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 18px;
}

a { color: inherit; text-decoration: none; }

.container {
    width: 100%;
    min-height: 78vh;
    display: flex;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 22px 50px rgba(2, 13, 22, 0.55);
}

.left {
    width: 50%;
    background: linear-gradient(155deg, var(--accent), #3ff7c9);
    color: #052531;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    clip-path: polygon(0 0, 100% 0, 84% 100%, 0 100%);
}

.left h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 4.2vw, 2.8rem);
    margin-bottom: 15px;
}

.left p {
    line-height: 1.6;
}

.left ul {
    margin-top: 20px;
    padding-left: 18px;
}

.left li {
    margin-bottom: 8px;
}

.right {
    width: 50%;
    background: rgba(16, 37, 66, 0.92);
    color: var(--text);
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right h2 {
    font-family: 'Fraunces', serif;
    margin-bottom: 5px;
}

.role-toggle {
    display: flex;
    background: #0a192f;
    padding: 4px;
    border-radius: 12px;
    margin-bottom: 25px;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.role-option {
    flex: 1;
    text-align: center;
    padding: 8px;
    cursor: pointer;
    border-radius: 10px;
    font-size: 14px;
    transition: all 0.3s ease;
    color: var(--muted);
}

.role-option.active {
    background: var(--accent);
    color: #052531;
    font-weight: 600;
}

.right p.subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 15px;
}

.input-group {
    margin-bottom: 20px;
}

input {
    width: 100%;
    border: 1px solid #355273;
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    background: #0e223d;
    outline: none;
}

input:focus {
    border-color: var(--accent);
}

button {
    margin-top: 8px;
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(120deg, #2f81f7, #79c0ff);
    color: #f4f7fb;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease;
    box-shadow: 0 8px 18px rgba(47, 129, 247, 0.18);
}

button:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
}

.link {
    margin-top: 15px;
    font-size: 13px;
}

.link a {
    color: var(--accent);
    text-decoration: none;
}

.mini-links {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    font-size: 13px;
}

.mini-links a {
    color: var(--muted);
}

@media (max-width: 900px) {
    .container {
        flex-direction: column;
    }

    .left,
    .right {
        width: 100%;
    }

    .left {
        clip-path: none;
    }
}

@keyframes floatChip {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-18px) rotate(8deg); }
}
</style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>
<div class="cursor-aura" id="cursorAura"></div>
<div class="float-chip chip-a"></div>
<div class="float-chip chip-b"></div>
<div class="page">
    <div class="top-nav">
        <a href="index.html">NexusNotes</a>
        <a href="about.html">About</a>
    </div>

    <div class="container">

    <!-- LEFT -->
    <div class="left">
        <h1>Welcome Back</h1>
        <p>Sign in to continue your learning flow and open your dashboard.</p>
        <ul>
            <li>Subject library</li>
            <li>Recent resources</li>
            <li>Tech trend highlights</li>
        </ul>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <h2>Login</h2>
        <p class="subtitle">Select your account type to continue.</p>

        <div class="role-toggle" id="roleToggle">
            <div class="role-option active" data-role="user">Student</div>
            <div class="role-option" data-role="admin">Admin</div>
        </div>

        <div class="input-group">
            <input type="email" id="email" placeholder="Email">
        </div>

        <div class="input-group">
            <input type="password" id="password" placeholder="Password">
        </div>

        <button id="loginBtn" onclick="handleLogin()">Login</button>
        <p id="errorMsg" style="color:#ff4d4d; font-size:13px; margin-top:10px; display:none;"></p>

        <div class="link">
            Do not have an account? <a href="signup.html">Sign up</a>
        </div>

        <div class="mini-links">
            <a href="index.html">Landing</a>
            <a href="contact.html">Contact</a>
        </div>
    </div>

    </div>
</div>

<script src="auth.js"></script>
<script>
let selectedRole = 'user';

(async () => {
    const user = window.NexusAuth.getUser();
    if (user) {
        if (user.role === 'ADMIN' || user.role === 'OWNER') {
            window.location.href = 'admin-dashboard.html';
        } else {
            window.location.href = 'home.html';
        }
    }
})();

// Role toggle logic
document.querySelectorAll('.role-option').forEach(opt => {
    opt.addEventListener('click', () => {
        document.querySelectorAll('.role-option').forEach(o => o.classList.remove('active'));
        opt.classList.add('active');
        selectedRole = opt.dataset.role;
    });
});

async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('loginBtn');

    if (!email || !password) {
        errorMsg.textContent = 'Please enter email and password.';
        errorMsg.style.display = 'block';
        return;
    }

    btn.textContent = 'Logging in...';
    btn.disabled = true;
    errorMsg.style.display = 'none';

    try {
        const res = await fetch(window.NexusAuth.getApiBase() + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const data = await window.NexusAuth.parseJsonSafe(res);

        if (!res.ok) {
            throw new Error((data && data.message) || 'Login failed');
        }

        const role = data.user.role;
        const isAdmin = (role === 'ADMIN' || role === 'OWNER');

        if (selectedRole === 'admin' && !isAdmin) {
            throw new Error('Role mismatch: Your account does not have admin privileges.');
        }

        if (selectedRole === 'user' && isAdmin) {
             // Admins can log in as users, but we should probably redirect them to admin dashboard anyway or allow them to see user view.
             // User requested: If returned JWT has role: "admin", redirect to admin-dashboard.html.
        }

        window.NexusAuth.saveSession(data.token, data.user);
        
        if (isAdmin) {
            window.location.href = 'admin-dashboard.html';
        } else {
            window.location.href = 'home.html';
        }
    } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        btn.textContent = 'Login';
        btn.disabled = false;
    }
}

// Allow Enter key to submit
document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
});

const cursorAura = document.getElementById('cursorAura');
document.addEventListener('mousemove', (event) => {
    cursorAura.style.left = event.clientX + 'px';
    cursorAura.style.top = event.clientY + 'px';
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Subject - NexusNotes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0d1b2a;
    --bg-soft: #1b263b;
    --card: #102542;
    --text: #f4f7fb;
    --muted: #9fb2ca;
    --accent: #00d4ff;
}

body {
    margin: 0;
    font-family: 'Space Grotesk', sans-serif;
    background: radial-gradient(circle at top left, #224f7a 0%, var(--bg) 45%), var(--bg);
    color: var(--text);
}

.header {
    background: rgba(16, 37, 66, 0.95);
    padding: 15px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
}

.header h2 {
    font-family: 'Fraunces', serif;
}

.header-links {
    display: flex;
    gap: 10px;
}

.header-links a {
    color: inherit;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 8px;
    padding: 7px 10px;
}

.container {
    width: min(1000px, 92%);
    margin: 0 auto;
    padding: 26px 0 50px;
}

.section {
    margin-top: 30px;
}

.section h3 {
    margin-bottom: 12px;
}

.box {
    background: rgba(16, 37, 66, 0.9);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    transition: 0.2s;
    cursor: pointer;
}

.box:hover {
    border-color: rgba(0, 212, 255, 0.5);
    transform: translateY(-1px);
}

.muted {
    color: var(--muted);
}
</style>
</head>

<body>

<div class="header">
    <h2 id="subjectName">Subject</h2>
    <div class="header-links">
        <a href="index.html">Landing</a>
        <a href="home.html">Dashboard</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

<div class="container">

    <!-- NOTES -->
    <div class="section">
        <h3>Notes</h3>
        <div id="notesContainer">
            <div class="box muted" style="cursor:default;">Loading...</div>
        </div>
    </div>

    <!-- QUESTIONS -->
    <div class="section">
        <h3>Question Bank</h3>
        <div id="questionsContainer">
            <div class="box muted" style="cursor:default;">Loading...</div>
        </div>
    </div>

    <!-- PROJECTS -->
    <div class="section">
        <h3>Projects</h3>
        <div id="projectsContainer">
            <div class="box muted" style="cursor:default;">Loading...</div>
        </div>
    </div>

    <!-- TECH TRENDS -->
    <div class="section">
        <h3>Tech Trends</h3>
        <div class="box">Latest advancements in this subject</div>
    </div>

</div>

<script>
const API = 'http://localhost:5000/api';
const params = new URLSearchParams(window.location.search);
const subjectId = params.get('id');
const subjectName = params.get('name') || 'Subject';

// Auth guard
const token = localStorage.getItem('token');
if (!token) { window.location.href = 'login.html'; }

function authHeaders() {
    return { 'Authorization': 'Bearer ' + token };
}

// Set subject title
document.getElementById('subjectName').innerText = subjectName;

async function loadSubjectData() {
    if (!subjectId) {
        renderFallback();
        return;
    }

    try {
        const res = await fetch(API + '/resources?subjectId=' + subjectId + '&limit=50', { headers: authHeaders() });
        if (res.status === 401) { window.location.href = 'login.html'; return; }
        const data = await res.json();
        const resources = data.data || data || [];

        const notes     = resources.filter(r => r.type === 'NOTE'     || r.category === 'NOTE');
        const questions = resources.filter(r => r.type === 'QUESTION' || r.category === 'QUESTION');
        const projects  = resources.filter(r => r.type === 'PROJECT'  || r.category === 'PROJECT');
        const others    = resources.filter(r => !['NOTE','QUESTION','PROJECT'].includes(r.type || r.category));

        renderSection('notesContainer',     notes.length     ? notes     : others.slice(0,3), 'No notes uploaded yet.');
        renderSection('questionsContainer', questions.length ? questions : [],               'No questions uploaded yet.');
        renderSection('projectsContainer',  projects.length  ? projects  : [],               'No projects uploaded yet.');

    } catch (e) {
        ['notesContainer','questionsContainer','projectsContainer'].forEach(id => {
            document.getElementById(id).innerHTML = '<div class="box" style="color:#aaa;">Failed to load resources.</div>';
        });
    }
}

function renderSection(containerId, items, emptyMsg) {
    const container = document.getElementById(containerId);
    if (!items.length) {
        container.innerHTML = `<div class="box muted" style="cursor:default;">${emptyMsg}</div>`;
        return;
    }
    container.innerHTML = items.map(r => {
        const title = r.title || r.name || r.fileName || 'Resource';
        const clickable = r.fileUrl ? `onclick="window.open('${r.fileUrl}','_blank')"` : '';
        const badge = r.type || r.category || '';
        return `<div class="box" ${clickable}>${title}${badge ? ' <span style="font-size:11px;color:#00d4ff;">['+badge+']</span>' : ''}</div>`;
    }).join('');
}

function renderFallback() {
    // No subjectId in URL — show placeholder
    ['notesContainer','questionsContainer','projectsContainer'].forEach(id => {
        document.getElementById(id).innerHTML = '<div class="box" style="color:#aaa;cursor:default;">No subject selected.</div>';
    });
}

loadSubjectData();
</script>

</body>
</html>

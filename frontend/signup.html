<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | NexusNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0d1b2a;
    --bg-soft: #1b263b;
    --card: #102542;
    --text: #f4f7fb;
    --muted: #9fb2ca;
    --accent: #3ff7c9;
    --accent2: #00d4ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    background: radial-gradient(circle at right top, #224f7a 0%, var(--bg) 48%), var(--bg);
    color: var(--text);
    overflow: hidden;
}

.cursor-aura {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(63, 247, 201, 0.2), rgba(63, 247, 201, 0));
    transform: translate(-50%, -50%);
    z-index: 0;
}

.float-ring {
    position: fixed;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 50%;
    z-index: 0;
    animation: ringDrift 12s ease-in-out infinite;
}

.ring-a {
    width: 120px;
    height: 120px;
    left: 10vw;
    top: 18vh;
}

.ring-b {
    width: 170px;
    height: 170px;
    right: 8vw;
    bottom: 10vh;
    animation-delay: 1.4s;
}

.page {
    width: min(1040px, 92%);
    margin: 0 auto;
    padding-top: 28px;
    position: relative;
    z-index: 1;
}

.top-nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 18px;
}

a { color: inherit; text-decoration: none; }

.container {
    width: 100%;
    min-height: 78vh;
    display: flex;
    border-radius: 18px;
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 22px 50px rgba(2, 13, 22, 0.55);
}

.left {
    width: 50%;
    background: linear-gradient(155deg, var(--accent), var(--accent2));
    color: #06231e;
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    clip-path: polygon(0 0, 100% 0, 84% 100%, 0 100%);
}

.left h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 4.2vw, 2.8rem);
    margin-bottom: 10px;
}

.left p {
    line-height: 1.6;
}

.right {
    width: 50%;
    background: rgba(16, 37, 66, 0.92);
    color: var(--text);
    padding: 40px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.right h2 {
    font-family: 'Fraunces', serif;
    margin-bottom: 10px;
}

.right p { color: var(--muted); margin-bottom: 20px; font-size: 13px; }

input {
    width: 100%;
    border: 1px solid #355273;
    border-radius: 10px;
    background: #0e223d;
    padding: 10px 12px;
    margin-bottom: 20px;
    color: var(--text);
    outline: none;
}

input:focus {
    border-color: var(--accent);
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(120deg, #2f81f7, #79c0ff);
    color: #f4f7fb;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 8px 18px rgba(47, 129, 247, 0.18);
}

button:hover {
    transform: translateY(-1px);
    filter: brightness(1.05);
}

.link {
    margin-top: 15px;
    font-size: 13px;
}

.link a {
    color: var(--accent2);
    text-decoration: none;
}

.mini-links {
    margin-top: 12px;
    display: flex;
    gap: 12px;
    font-size: 13px;
}

.mini-links a {
    color: var(--muted);
}

@media (max-width: 900px) {
    .container {
        flex-direction: column;
    }

    .left,
    .right {
        width: 100%;
    }

    .left {
        clip-path: none;
    }
}

@keyframes ringDrift {
    0%, 100% { transform: translateY(0) translateX(0); }
    50% { transform: translateY(-16px) translateX(12px); }
}
</style>
</head>

<body>
<div class="cursor-aura" id="cursorAura"></div>
<div class="float-ring ring-a"></div>
<div class="float-ring ring-b"></div>
<div class="page">
    <div class="top-nav">
        <a href="index.html">NexusNotes</a>
        <a href="about.html">About</a>
    </div>

<div class="container">

<div class="left">
    <h1>Join NexusNotes</h1>
    <p>Create your account and access your complete study workspace instantly.</p>
</div>

<div class="right">
    <h2>Sign Up</h2>
    <p>Create your account</p>

    <input type="text" id="fullName" placeholder="Full Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <input type="password" id="confirm" placeholder="Confirm Password">

    <button id="registerBtn" onclick="handleRegister()">Register</button>
    <p id="errorMsg" style="color:#ff4d4d; font-size:13px; margin-top:10px; display:none;"></p>

    <div class="link">
        Already have an account? <a href="login.html">Login</a>
    </div>

    <div class="mini-links">
        <a href="index.html">Landing</a>
        <a href="contact.html">Contact</a>
    </div>
</div>

</div>
</div>

<script src="auth.js"></script>
<script>
(async () => {
    await window.NexusAuth.redirectIfAuthenticated('home.html');
})();

async function handleRegister() {
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const errorMsg = document.getElementById('errorMsg');
    const btn = document.getElementById('registerBtn');

    errorMsg.style.display = 'none';

    if (!fullName || !email || !password || !confirm) {
        errorMsg.textContent = 'All fields are required.';
        errorMsg.style.display = 'block';
        return;
    }

    if (password !== confirm) {
        errorMsg.textContent = 'Passwords do not match.';
        errorMsg.style.display = 'block';
        return;
    }

    if (password.length < 6) {
        errorMsg.textContent = 'Password must be at least 6 characters.';
        errorMsg.style.display = 'block';
        return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
        const res = await fetch(window.NexusAuth.getApiBase() + '/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullName, email, password })
        });

        const data = await window.NexusAuth.parseJsonSafe(res);

        if (!res.ok) {
            throw new Error((data && data.message) || 'Registration failed');
        }

        window.NexusAuth.saveSession(data.token, data.user);
        window.location.href = 'home.html';
    } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.style.display = 'block';
        btn.textContent = 'Register';
        btn.disabled = false;
    }
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleRegister();
});

const cursorAura = document.getElementById('cursorAura');
document.addEventListener('mousemove', (event) => {
    cursorAura.style.left = event.clientX + 'px';
    cursorAura.style.top = event.clientY + 'px';
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexusNotes Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Poppins', sans-serif;
    background: #0a0a0a;
    color: white;
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 230px;
    height: 100vh;
    background: #111;
    padding: 20px;
    box-shadow: 0 0 20px rgba(128,0,255,0.3);
}

.sidebar h2 {
    color: #8e2de2;
    margin-bottom: 30px;
}

.sidebar ul { list-style: none; }

.sidebar ul li {
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.sidebar ul li:hover {
    background: #8e2de2;
}

/* MAIN */
.main {
    flex: 1;
    padding: 20px;
}

/* TOP BAR */
.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
}

.search {
    width: 300px;
    padding: 8px;
    border-radius: 6px;
    border: none;
}

.buttons {
    display: flex;
    gap: 10px;
}

.btn {
    background: #8e2de2;
    border: none;
    padding: 8px 15px;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: #6a00ff;
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
}

.card {
    background: #111;
    padding: 18px;
    margin: 10px;
    border-radius: 10px;
    width: 200px;
    box-shadow: 0 0 10px rgba(128,0,255,0.3);
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 20px rgba(128,0,255,0.6);
}

/* SECTION */
.section {
    margin-top: 35px;
}
.card {
    cursor: pointer;
    position: relative;
}

.card::after {
    content: "Open →";
    position: absolute;
    bottom: 10px;
    right: 15px;
    font-size: 12px;
    color: #8e2de2;
    opacity: 0;
    transition: 0.3s;
}

.card:hover::after {
    opacity: 1;
}
.card {
    background: #2a2a2a;
    color: #f1f1f1;
}

.card:hover {
    background: #333;
}

/* TECH TRENDS */
.trend {
    background: #111;
    padding: 15px;
    margin: 10px 0;
    border-left: 4px solid #8e2de2;
}

/* RECENT */
.recent-item {
    background: #111;
    padding: 12px;
    margin: 8px 0;
    border-radius: 6px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>NexusNotes</h2>
    <ul>
        <li>Dashboard</li>
        <li>Subjects</li>
        <li>Uploads</li>
        <li>Tech Trends</li>
        <li>Profile</li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <!-- TOP BAR -->
    <div class="topbar">
        <input class="search" id="searchInput" placeholder="Search notes, subjects..." oninput="filterSubjects()">
        
        <div class="buttons">
            <span id="userName" style="font-size:13px; color:#aaa; align-self:center;"></span>
            <button class="btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <!-- SUBJECTS -->
    <h3>Computer Science Subjects</h3>
    <div class="cards" id="subjectCards">
        <div style="color:#aaa; padding:20px;">Loading subjects...</div>
    </div>

    <!-- TECH TRENDS -->
    <div class="section">
        <h3>Tech Trends</h3>
        <div id="techTrendsContainer">
            <div style="color:#aaa; padding:10px;">Loading trends...</div>
        </div>
    </div>

    <!-- RECENT -->
    <div class="section">
        <h3>Recent Uploads</h3>
        <div id="recentUploads">
            <div style="color:#aaa; padding:10px;">Loading...</div>
        </div>
    </div>

</div>

<script>
const API = 'http://localhost:5000/api';
let allSubjects = [];

// Auth guard
const token = localStorage.getItem('token');
if (!token) {
    window.location.href = 'login.html';
}

// Show user name
const user = JSON.parse(localStorage.getItem('user') || '{}');
if (user.fullName) {
    document.getElementById('userName').textContent = 'Hi, ' + user.fullName;
}

function authHeaders() {
    return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
}

function handleLogout() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
}

function openSubject(id, name) {
    window.location.href = 'subject.html?id=' + encodeURIComponent(id) + '&name=' + encodeURIComponent(name);
}

function filterSubjects() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = q ? allSubjects.filter(s => s.name.toLowerCase().includes(q)) : allSubjects;
    renderSubjectCards(filtered);
}

function renderSubjectCards(subjects) {
    const container = document.getElementById('subjectCards');
    if (!subjects.length) {
        container.innerHTML = '<div style="color:#aaa; padding:20px;">No subjects found.</div>';
        return;
    }
    container.innerHTML = subjects.map(s =>
        `<div class="card" onclick="openSubject('${s._id}', '${s.name.replace(/'/g, "\\'")}')"><strong>${s.name}</strong>${s.code ? '<br><small style="color:#8e2de2;">' + s.code + '</small>' : ''}</div>`
    ).join('');
}

async function loadSubjects() {
    try {
        const res = await fetch(API + '/subjects', { headers: authHeaders() });
        if (res.status === 401) { handleLogout(); return; }
        const data = await res.json();
        allSubjects = Array.isArray(data) ? data : [];
        renderSubjectCards(allSubjects);
    } catch (e) {
        document.getElementById('subjectCards').innerHTML = '<div style="color:#ff4d4d;">Failed to load subjects.</div>';
    }
}

async function loadTechTrends() {
    try {
        const res = await fetch(API + '/tech-trends?limit=5', { headers: authHeaders() });
        if (!res.ok) { document.getElementById('techTrendsContainer').innerHTML = '<div style="color:#aaa;">No trends available.</div>'; return; }
        const data = await res.json();
        const trends = data.data || [];
        const container = document.getElementById('techTrendsContainer');
        if (!trends.length) {
            container.innerHTML = '<div style="color:#aaa;">No tech trends yet.</div>';
            return;
        }
        container.innerHTML = trends.map(t =>
            `<div class="trend">${t.url ? `<a href="${t.url}" target="_blank" style="color:inherit;text-decoration:none;">${t.title}</a>` : t.title}${t.summary ? '<br><small style="color:#aaa;">' + t.summary + '</small>' : ''}</div>`
        ).join('');
    } catch (e) {
        document.getElementById('techTrendsContainer').innerHTML = '<div style="color:#aaa;">No trends available.</div>';
    }
}

async function loadRecentUploads() {
    try {
        const res = await fetch(API + '/resources?limit=3', { headers: authHeaders() });
        if (!res.ok) { document.getElementById('recentUploads').innerHTML = '<div style="color:#aaa;">No recent uploads.</div>'; return; }
        const data = await res.json();
        const items = data.data || data || [];
        const container = document.getElementById('recentUploads');
        if (!items.length) {
            container.innerHTML = '<div style="color:#aaa;">No recent uploads yet.</div>';
            return;
        }
        container.innerHTML = items.map(r =>
            `<div class="recent-item"><strong>${r.title || r.name || 'Resource'}</strong> — ${r.subject ? r.subject.name || '' : ''}</div>`
        ).join('');
    } catch (e) {
        document.getElementById('recentUploads').innerHTML = '<div style="color:#aaa;">No recent uploads available.</div>';
    }
}

loadSubjects();
loadTechTrends();
loadRecentUploads();
</script> 

</body>
</html>

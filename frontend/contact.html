<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | NexusNotes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #06101d;
    --card: rgba(15, 34, 57, 0.83);
    --text: #e9f2ff;
    --muted: #a4bad7;
    --accent: #2ee7ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: 'Space Grotesk', sans-serif;
    background: radial-gradient(circle at top right, #214b74 0%, transparent 35%), radial-gradient(circle at 20% 70%, #1e3556 0%, transparent 30%), var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow: hidden;
}
.container { width: min(720px, 92%); margin: 0 auto; padding: 30px 0 50px; position: relative; z-index: 1; }
.cursor-light {
    position: fixed;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    pointer-events: none;
    background: radial-gradient(circle, rgba(46,231,255,0.2), rgba(46,231,255,0));
    transform: translate(-50%, -50%);
    z-index: 0;
}
.dot {
    position: fixed;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: rgba(46,231,255,0.55);
    box-shadow: 0 0 10px rgba(46,231,255,0.7);
    z-index: 0;
    animation: floatDot 8s ease-in-out infinite;
}
.dot-1 { top: 26vh; left: 8vw; }
.dot-2 { top: 62vh; right: 12vw; animation-delay: 1.5s; }
.dot-3 { top: 14vh; right: 24vw; animation-delay: 0.8s; }
header { display: flex; justify-content: space-between; margin-bottom: 24px; }
a { color: inherit; text-decoration: none; }
h1 { margin-bottom: 10px; }
p { color: var(--muted); margin-bottom: 20px; }
form {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.16);
    border-radius: 14px;
    padding: 20px;
    backdrop-filter: blur(6px);
}
label { font-size: 0.9rem; display: block; margin-bottom: 7px; }
input, textarea {
    width: 100%;
    margin-bottom: 14px;
    padding: 10px 12px;
    border: 1px solid #355273;
    border-radius: 9px;
    background: rgba(7, 21, 38, 0.9);
    color: var(--text);
}
textarea { min-height: 110px; resize: vertical; }
button {
    border: none;
    background: linear-gradient(120deg, #2ee7ff, #8bffbd);
    color: #0f2d22;
    padding: 10px 14px;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s ease;
}
button:hover { transform: translateY(-1px) scale(1.01); }
#status { margin-top: 12px; color: var(--accent); }

@keyframes floatDot {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(-22px); opacity: 1; }
}
</style>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>
<div class="cursor-light" id="cursorLight"></div>
<div class="dot dot-1"></div>
<div class="dot dot-2"></div>
<div class="dot dot-3"></div>
<div class="container">
    <header>
        <a href="index.html">NexusNotes</a>
        <a href="home.html">Dashboard</a>
    </header>

    <h1>Contact</h1>
    <p>Send us a message about feedback, partnerships, or product ideas.</p>

    <form id="contactForm">
        <label for="name">Name</label>
        <input id="name" name="name" required>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send Message</button>
        <p id="status"></p>
    </form>
</div>

<script>
const form = document.getElementById('contactForm');
const statusText = document.getElementById('status');

form.addEventListener('submit', (event) => {
    event.preventDefault();
    statusText.textContent = 'Message saved locally. Connect API endpoint when backend route is available.';
    form.reset();
});

const cursorLight = document.getElementById('cursorLight');
document.addEventListener('mousemove', (event) => {
    cursorLight.style.left = event.clientX + 'px';
    cursorLight.style.top = event.clientY + 'px';
});
</script>
</body>
</html>
